name: Publish

on:
  push:
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish
    needs: [ci]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Enable corepack
        run: corepack enable

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --immutable

      - name: Extract version from tag
        id: version
        run: |
          TAG=${{ github.ref_name }}
          VERSION=${TAG#v}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

      - name: Sync version to workspace root
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Sync version to all packages
        run: |
          VERSION=${{ steps.version.outputs.version }}
          for dir in packages/*/; do
            PACKAGE_JSON="${dir}package.json"
            if [ -f "$PACKAGE_JSON" ]; then
              node -e "const fs=require('fs');const pkg=JSON.parse(fs.readFileSync('$PACKAGE_JSON'));pkg.version='$VERSION';fs.writeFileSync('$PACKAGE_JSON',JSON.stringify(pkg,null,2)+'\\n');"
            fi
          done

      - name: Build all packages
        run: yarn build

      - name: Publish packages to npm
        run: |
          for dir in packages/*/; do
            PACKAGE_JSON="${dir}package.json"
            if [ -f "$PACKAGE_JSON" ]; then
              cd "$dir"
              npm publish --provenance --access public
              cd ../..
            fi
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
